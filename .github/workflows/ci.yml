name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend (Python 3.10)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt \
            -i https://pypi.tuna.tsinghua.edu.cn/simple \
            --extra-index-url https://pypi.org/simple

      - name: Lint with ruff
        working-directory: backend
        run: |
          pip install ruff
          ruff check .

      - name: Syntax check
        working-directory: backend
        run: |
          python -m py_compile routers/api.py
          python -m py_compile core/agent_memory.py
          python -m py_compile core/rag_search.py
          python -m py_compile core/hallucination_guard.py
          python -m py_compile core/memorial_profile.py
          python -m py_compile core/audio_features.py

  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci || npm install

      - name: Lint
        working-directory: frontend
        run: npm run lint || echo "Lint script not defined, skipping"

      - name: Build
        working-directory: frontend
        run: npm run build

  docs:
    name: Documentation sanity
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check required files
        run: |
          test -f README.md || (echo "README.md missing" && exit 1)
          test -f README_CN.md || (echo "README_CN.md missing" && exit 1)
          test -f LICENSE || (echo "LICENSE missing" && exit 1)
          test -f CONTRIBUTING.md || (echo "CONTRIBUTING.md missing" && exit 1)
          test -f SECURITY.md || (echo "SECURITY.md missing" && exit 1)
          test -f CHANGELOG.md || (echo "CHANGELOG.md missing" && exit 1)
          test -f ROADMAP.md || (echo "ROADMAP.md missing" && exit 1)

      - name: Check no API keys leaked
        run: |
          if grep -rE "sk-[a-zA-Z0-9]{20,}" . --include="*.md" --include="*.py" --include="*.js" --include="*.vue" --include="*.json" --exclude-dir=node_modules; then
            echo "ERROR: Possible API key found in tracked files"
            exit 1
          fi
          echo "OK: no API key patterns found"
